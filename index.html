<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Drop Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-wrapper">
        <div class="brand-strip">
            <img src="img/cw_logo-horizontal.png" alt="Community Water logo" class="brand-logo">
            <img src="img/cw_logo.png" alt="Community Water icon" class="brand-icon">
        </div>

        <div class="game-card">
            <h1 class="game-title">Water Drop</h1>
            <p class="game-tagline">Catch the good drops, avoid the bad ones!</p>
            <div class="score-panel">
                <div class="score">Score: <span id="score">0</span></div>
                <div class="timer">Time: <span id="time">30</span>s</div>
                <label class="difficulty-control" for="difficulty">
                    <span>Difficulty</span>
                    <select id="difficulty">
                        <option value="easy">Easy</option>
                        <option value="medium">Medium</option>
                        <option value="hard">Hard</option>
                    </select>
                </label>
                <button id="start-btn">Start Game</button>
            </div>
            
            <div id="game-container"></div>
            <div class="game-links">
                <a href="https://www.charitywater.org/global-water-crisis?_gl=1*et3wfr*_up*MQ..*_gs*MQ..&gclid=Cj0KCQjw39zSBhDhDhARIsANammDsSZCCk70ItNWruB2deiv05tDnEIpnvf_4YJ8eoB4N0gSq2jxeuyJIaAil7EALw_wcB&gbraid=0AAAAADNj5D_k3bYEx95hRosi0b8V_m2Z3" target="_blank" rel="noopener noreferrer">Visit Charity: water</a>
                <a href="https://www.charitywater.org/donate/the-spring?_gl=1*1qwszov*_up*MQ..*_gs*MQ..&gclid=Cj0KCQjw39zSBhDhARIsANammDsSZCCk70ItNWruB2deiv05tDnEIpnvf_4YJ8eoB4N0gSq2jxeuyJIaAil7EALw_wcB&gbraid=0AAAAADNj5D_k3bYEx95hRosi0b8V_m2Z3" target="_blank" rel="noopener noreferrer">Donate Now</a>
            </div>
        </div>

        <div id="game-over" class="hidden">
            <div class="confetti-layer" aria-hidden="true"></div>
            <div class="game-over-content">
                <h2>Time's Up!</h2>
                <p>Your final score was <span id="final-score">0</span></p>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
